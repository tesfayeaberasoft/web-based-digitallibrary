<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarian API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Librarian Management API Test</h1>
    <p>This page tests the backend librarian management APIs.</p>
    
    <div class="test-section">
        <h3>🔐 Authentication</h3>
        <button onclick="login()">Login as Admin</button>
        <div id="auth-status"></div>
    </div>
    
    <div class="test-section">
        <h3>👨‍💼 List Librarians</h3>
        <button onclick="listLibrarians()">Get Librarians List</button>
        <div id="librarians-list"></div>
    </div>
    
    <div class="test-section">
        <h3>🔍 Test Librarian Details</h3>
        <input type="number" id="librarian-id" placeholder="Librarian ID" />
        <button onclick="getLibrarianDetails()">Get Details</button>
        <div id="librarian-details"></div>
    </div>
    
    <div class="test-section">
        <h3>📊 Test Results</h3>
        <div id="test-log"></div>
    </div>

    <script>
        let authToken = '';
        let librarians = [];
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('test-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }
        
        async function login() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@digitallibrary.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    document.getElementById('auth-status').innerHTML = 
                        `<div class="success">✅ Logged in as: ${data.user.full_name} (${data.user.role})</div>`;
                    log('Authentication successful', 'success');
                } else {
                    document.getElementById('auth-status').innerHTML = 
                        `<div class="error">❌ Login failed: ${data.message}</div>`;
                    log('Authentication failed: ' + data.message, 'error');
                }
            } catch (error) {
                log('Login error: ' + error.message, 'error');
            }
        }
        
        async function listLibrarians() {
            if (!authToken) {
                log('Please login first', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/users/list?role=librarian&limit=10', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    librarians = data.users;
                    let html = '<div class="success">✅ Librarians loaded successfully</div>';
                    html += '<table border="1" style="width:100%; margin-top:10px;">';
                    html += '<tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Department</th><th>Employee ID</th></tr>';
                    
                    librarians.forEach(librarian => {
                        html += `<tr>
                            <td>${librarian.id}</td>
                            <td>${librarian.full_name}</td>
                            <td>${librarian.email}</td>
                            <td>${librarian.role}</td>
                            <td>${librarian.status}</td>
                            <td>${librarian.department || 'N/A'}</td>
                            <td>${librarian.employee_id || librarian.user_id}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    
                    document.getElementById('librarians-list').innerHTML = html;
                    log(`Loaded ${librarians.length} librarians`, 'success');
                } else {
                    document.getElementById('librarians-list').innerHTML = 
                        `<div class="error">❌ Failed to load librarians: ${data.message}</div>`;
                    log('Failed to load librarians: ' + data.message, 'error');
                }
            } catch (error) {
                log('List librarians error: ' + error.message, 'error');
            }
        }
        
        async function getLibrarianDetails() {
            const librarianId = document.getElementById('librarian-id').value;
            if (!librarianId || !authToken) {
                log('Please login and enter a librarian ID first', 'error');
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${librarianId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const librarian = data.user;
                    let html = '<div class="success">✅ Librarian details loaded successfully</div>';
                    html += '<pre>' + JSON.stringify(librarian, null, 2) + '</pre>';
                    
                    document.getElementById('librarian-details').innerHTML = html;
                    log(`Librarian details loaded for ID ${librarianId}`, 'success');
                } else {
                    document.getElementById('librarian-details').innerHTML = 
                        `<div class="error">❌ Failed to load librarian details: ${data.message}</div>`;
                    log('Failed to load librarian details: ' + data.message, 'error');
                }
            } catch (error) {
                log('Get librarian details error: ' + error.message, 'error');
                document.getElementById('librarian-details').innerHTML = 
                    `<div class="error">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Auto-login on page load for convenience
        window.onload = function() {
            log('Page loaded. Click "Login as Admin" to start testing.');
        };
    </script>
</body>
</html>
