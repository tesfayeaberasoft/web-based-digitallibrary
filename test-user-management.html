<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { margin: 5px; padding: 8px 15px; cursor: pointer; }
        .delete-btn { background-color: #dc3545; color: white; border: none; }
        .suspend-btn { background-color: #ffc107; color: black; border: none; }
        .update-btn { background-color: #007bff; color: white; border: none; }
        pre { background-color: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 Library Users Management API Test</h1>
    <p>This page tests the backend user management APIs for library users only (excludes admins and librarians).</p>
    
    <div class="test-section">
        <h3>🔐 Authentication</h3>
        <button onclick="login()">Login as Admin</button>
        <div id="auth-status"></div>
    </div>
    
    <div class="test-section">
        <h3>👥 List Users</h3>
        <button onclick="listUsers()">Get Users List</button>
        <div id="users-list"></div>
    </div>
    
    <div class="test-section">
        <h3>🔧 User Actions</h3>
        <p>Select a user from the list above first, then test actions:</p>
        <input type="number" id="selected-user-id" placeholder="User ID" />
        <button class="update-btn" onclick="testUpdate()">Test Update User</button>
        <button class="suspend-btn" onclick="testSuspend()">Test Suspend/Activate</button>
        <button class="delete-btn" onclick="testDelete()">Test Delete User</button>
        <div id="action-results"></div>
    </div>
    
    <div class="test-section">
        <h3>📊 Test Results</h3>
        <div id="test-log"></div>
    </div>

    <script>
        let authToken = '';
        let users = [];
        
        function log(message, type = 'info') {
            const logDiv = document.getElementById('test-log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
        }
        
        async function login() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@digitallibrary.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.token;
                    document.getElementById('auth-status').innerHTML = 
                        `<div class="success">✅ Logged in as: ${data.user.full_name} (${data.user.role})</div>`;
                    log('Authentication successful', 'success');
                } else {
                    document.getElementById('auth-status').innerHTML = 
                        `<div class="error">❌ Login failed: ${data.message}</div>`;
                    log('Authentication failed: ' + data.message, 'error');
                }
            } catch (error) {
                log('Login error: ' + error.message, 'error');
            }
        }
        
        async function listUsers() {
            if (!authToken) {
                log('Please login first', 'error');
                return;
            }
            
            try {
                const response = await fetch('http://localhost:8000/api/users/list?limit=10&role=user', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    users = data.users;
                    let html = '<div class="success">✅ Library users loaded successfully</div>';
                    html += '<table border="1" style="width:100%; margin-top:10px;">';
                    html += '<tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Books</th><th>Fines</th></tr>';
                    
                    users.forEach(user => {
                        html += `<tr>
                            <td>${user.id}</td>
                            <td>${user.full_name}</td>
                            <td>${user.email}</td>
                            <td>${user.role}</td>
                            <td>${user.status}</td>
                            <td>${user.active_loans || 0}</td>
                            <td>$${(user.unpaid_fines || 0).toFixed(2)}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    
                    document.getElementById('users-list').innerHTML = html;
                    log(`Loaded ${users.length} library users (role: user only)`, 'success');
                } else {
                    document.getElementById('users-list').innerHTML = 
                        `<div class="error">❌ Failed to load users: ${data.message}</div>`;
                    log('Failed to load users: ' + data.message, 'error');
                }
            } catch (error) {
                log('List users error: ' + error.message, 'error');
            }
        }
        
        async function testUpdate() {
            const userId = document.getElementById('selected-user-id').value;
            if (!userId || !authToken) {
                log('Please login and select a user ID first', 'error');
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${userId}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        full_name: 'Test Updated Name',
                        phone: '123-456-7890',
                        password: 'newpassword123' // Test password update
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="success">✅ User updated successfully (including password)</div>`;
                    log(`User ${userId} updated successfully with new password`, 'success');
                } else {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="error">❌ Update failed: ${data.message}</div>`;
                    log(`Update failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log('Update error: ' + error.message, 'error');
            }
        }
        
        async function testSuspend() {
            const userId = document.getElementById('selected-user-id').value;
            if (!userId || !authToken) {
                log('Please login and select a user ID first', 'error');
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${userId}/suspend`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: 'toggle',
                        reason: 'Test suspension with reason - violating library policies'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="success">✅ ${data.message}</div>`;
                    log(`User ${userId} status changed successfully with reason`, 'success');
                } else {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="error">❌ Suspend failed: ${data.message}</div>`;
                    log(`Suspend failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log('Suspend error: ' + error.message, 'error');
            }
        }
        
        async function testDelete() {
            const userId = document.getElementById('selected-user-id').value;
            if (!userId || !authToken) {
                log('Please login and select a user ID first', 'error');
                return;
            }
            
            if (!confirm(`Are you sure you want to delete user ${userId}? This cannot be undone!`)) {
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="success">✅ ${data.message}</div>`;
                    log(`User ${userId} deleted successfully`, 'success');
                } else {
                    document.getElementById('action-results').innerHTML = 
                        `<div class="error">❌ Delete failed: ${data.message}</div>`;
                    log(`Delete failed: ${data.message}`, 'error');
                }
            } catch (error) {
                log('Delete error: ' + error.message, 'error');
            }
        }
        
        // Auto-login on page load for convenience
        window.onload = function() {
            log('Page loaded. Click "Login as Admin" to start testing.');
        };
    </script>
</body>
</html>
