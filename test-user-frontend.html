<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .result { background: #f5f5f5; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e9; color: #2e7d32; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        input, select { padding: 8px; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 User Management Frontend Test</h1>
        
        <div>
            <button onclick="testLogin()">1. Login as Admin</button>
            <button onclick="testCreateUser()">2. Create Test User</button>
            <button onclick="testUpdateUser()">3. Update User</button>
            <button onclick="testSuspendUser()">4. Suspend User</button>
            <button onclick="testDeleteUser()">5. Delete User</button>
            <button onclick="clearResults()">Clear Results</button>
        </div>
        
        <div>
            <h3>Test User Data:</h3>
            <input type="text" id="testUserId" placeholder="Test User ID" readonly>
            <input type="text" id="userName" placeholder="User Name" value="Frontend Test User">
            <input type="email" id="userEmail" placeholder="Email" value="frontendtest@example.com">
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        let authToken = '';
        let testUserId = '';
        
        function addResult(title, content, isError = false) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${isError ? 'error' : 'success'}`;
            div.innerHTML = `<h3>${title}</h3><pre>${content}</pre>`;
            results.appendChild(div);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'admin@digitallibrary.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    authToken = data.data.token;
                    addResult('✅ Login Successful', `Token: ${authToken.substring(0, 50)}...`);
                } else {
                    addResult('❌ Login Failed', JSON.stringify(data, null, 2), true);
                }
            } catch (error) {
                addResult('❌ Login Error', error.message, true);
            }
        }
        
        async function testCreateUser() {
            if (!authToken) {
                addResult('❌ Create User Failed', 'Please login first', true);
                return;
            }
            
            try {
                const userName = document.getElementById('userName').value;
                const userEmail = document.getElementById('userEmail').value;
                
                const response = await fetch('http://localhost:8000/api/users/create', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        full_name: userName,
                        email: userEmail,
                        password: 'password123',
                        phone: '+1-555-FRONTEND',
                        role: 'user',
                        status: 'active'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    testUserId = data.user.id;
                    document.getElementById('testUserId').value = testUserId;
                    addResult('✅ Create User Success', JSON.stringify(data, null, 2));
                } else {
                    addResult('❌ Create User Failed', JSON.stringify(data, null, 2), true);
                }
            } catch (error) {
                addResult('❌ Create User Error', error.message, true);
            }
        }
        
        async function testUpdateUser() {
            if (!authToken || !testUserId) {
                addResult('❌ Update User Failed', 'Please login and create user first', true);
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${testUserId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        full_name: 'Updated Frontend Test User',
                        phone: '+1-555-UPDATED'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addResult('✅ Update User Success', JSON.stringify(data, null, 2));
                } else {
                    addResult('❌ Update User Failed', JSON.stringify(data, null, 2), true);
                }
            } catch (error) {
                addResult('❌ Update User Error', error.message, true);
            }
        }
        
        async function testSuspendUser() {
            if (!authToken || !testUserId) {
                addResult('❌ Suspend User Failed', 'Please login and create user first', true);
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${testUserId}/suspend`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: 'suspend'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addResult('✅ Suspend User Success', JSON.stringify(data, null, 2));
                } else {
                    addResult('❌ Suspend User Failed', JSON.stringify(data, null, 2), true);
                }
            } catch (error) {
                addResult('❌ Suspend User Error', error.message, true);
            }
        }
        
        async function testDeleteUser() {
            if (!authToken || !testUserId) {
                addResult('❌ Delete User Failed', 'Please login and create user first', true);
                return;
            }
            
            try {
                const response = await fetch(`http://localhost:8000/api/users/${testUserId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    addResult('✅ Delete User Success', JSON.stringify(data, null, 2));
                    testUserId = '';
                    document.getElementById('testUserId').value = '';
                } else {
                    addResult('❌ Delete User Failed', JSON.stringify(data, null, 2), true);
                }
            } catch (error) {
                addResult('❌ Delete User Error', error.message, true);
            }
        }
    </script>
</body>
</html>
